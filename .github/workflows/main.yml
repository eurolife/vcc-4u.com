name: Build + Deploy (FTP)

on:
  push:
    branches: ['main', 'updates']

concurrency:
  group: deploy-vcc-website
  cancel-in-progress: true

jobs:
  web-deploy:
    name: 🎉 Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install + Build
        run: |
          npm ci
          npm run build

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: 107.180.27.240
          username: ${{ secrets.ftp_username }}
          password: ${{ secrets.ftp_password }}
          local-dir: ./dist/
          server-dir: public_html/vcc.winkletwebdesign.com/
